name: Build Production (Cloudflare Pages)

on:
  push:
    branches: [prod]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build
        run: npm run build
        env:
          DEPLOY_ENV: prod
          
      - name: Check Build
        run: ls -R dist

# Note: For Cloudflare Pages, it's often better to let Cloudflare pull directly from the 'prod' branch.
